<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEC●PO v0.50 (MIDI Export Edition)</title>
  <style>
    body { margin: 0; padding: 0; background: #0a0a14; color: #e0e0e0; font-family: 'Courier New', monospace; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
    .header { background: linear-gradient(90deg, #0a0a14 0%, #0d1a2e 50%, #0a0a14 100%); border-bottom: 1px solid #00d4ff33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; }
    .logo { color: #00d4ff; font-size: 16px; font-weight: bold; letter-spacing: 2px; }
    .mode-btn { background: transparent; border: 1px solid #00d4ff; color: #00d4ff; padding: 4px 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
    .mode-btn.active { background: #00d4ff; color: #0a0a14; }
    .play-btn { background: transparent; border: 1px solid #00ff88; color: #00ff88; padding: 4px 10px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: auto; }
    .play-btn.playing { background: #00ff88; color: #0a0a14; }
    .bpm-input { background: #0d1a2e; border: 1px solid #00d4ff44; color: #00d4ff; width: 42px; padding: 4px; text-align: center; font-size: 12px; }
    
    /* iPhone SEの横幅（375px）でも1列に絶対に収まるFILEコントロールバー */
    .file-bar { background: #0d1220; border-bottom: 1px solid #00d4ff22; padding: 4px 12px; display: flex; gap: 6px; font-size: 11px; justify-content: flex-start; }
    
    .roll-container { max-width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .step-header { display: flex; padding-left: 68px; border-bottom: 1px solid #1a1a2e; width: max-content; }
    .step-num { width: 28px; min-width: 28px; text-align: center; font-size: 9px; padding: 4px 0; }
    .step-num.active-step { background: #00ff8833; color: #00ff88 !important; font-weight: bold; }
    
    .grid-row { display: flex; align-items: center; border-bottom: 1px solid #111; }
    .note-label { width: 64px; min-width: 64px; text-align: right; padding-right: 8px; font-size: 10px; border-right: 1px solid #1a1a2e; }
    .cell { width: 28px; min-width: 28px; height: 26px; cursor: pointer; border-left: 1px solid #111; box-sizing: border-box; }
    .cell.active-column { background: #00ff8811 !important; }
    
    .stgt-container { padding: 0 0 280px 0; max-width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; display: none; }
    .stgt-table { width: 480px; }
    .stgt-header { display: grid; grid-template-columns: 24px 60px 110px 50px 50px 40px 40px; border-bottom: 1px solid #00d4ff22; padding: 6px 8px; font-size: 10px; color: #555; gap: 4px; }
    .stgt-row { display: grid; grid-template-columns: 24px 60px 110px 50px 50px 40px 40px; align-items: center; border-bottom: 1px solid #111; padding: 6px 8px; gap: 4px; }
    
    .modal { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1a2e; border-top: 1px solid #00d4ff66; padding: 10px 12px 24px; z-index: 200; display: none; }
    .st-box { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .st-btn { background: #0a0a14; border: 1px solid #333; color: #aaa; padding: 4px 5px; font-size: 9px; cursor: pointer; }
    .st-btn.active { background: #00d4ff; color: #0a0a14; border-color: #00d4ff; }
    .ok-btn { background: #00d4ff; border: 1px solid #00d4ff; color: #0a0a14; padding: 4px 12px; font-size: 11px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">DEC●PO</span>
    <button id="btn-roll" class="mode-btn active" onclick="switchMode('roll')">ROLL</button>
    <button id="btn-stgt" class="mode-btn" onclick="switchMode('stgt')">ST/GT</button>
    <span style="color:#555; font-size:9px; margin-left:4px;">BPM</span>
    <input type="number" id="bpm-val" value="120" class="bpm-input" onchange="updateBpm()">
    <button id="btn-play" class="play-btn" onclick="togglePlay()">▶ PLAY</button>
  </div>

  <!-- FILE Control Bar (v0.50 MIDI出力機能増設) -->
  <div class="file-bar">
    <button class="mode-btn" style="border-color: #00ff88; color: #00ff88; padding: 2px 4px; font-size: 10px;" onclick="saveToFile()">💾 JSON</button>
    <button class="mode-btn" style="border-color: #00d4ff; color: #00d4ff; padding: 2px 4px; font-size: 10px;" onclick="exportMidiFile()">🎹 MIDI</button>
    <button class="mode-btn" style="border-color: #ffb703; color: #ffb703; padding: 2px 4px; font-size: 10px;" onclick="triggerLoad()">📂 LOAD</button>
    <input type="file" id="file-loader" accept=".json" style="display: none;" onchange="loadFile(event)">
  </div>

  <!-- Piano Roll View -->
  <div id="view-roll" class="roll-container">
    <div class="step-header" id="step-header-content"></div>
    <div id="grid-content" style="overflow-y: auto; max-height: calc(100vh - 165px); width: max-content;"></div>
  </div>

  <!-- ST/GT View -->
  <div id="view-stgt" class="stgt-container">
    <div class="stgt-table">
      <div class="stgt-header">
        <div>#</div><div>NOTE</div><div>ST</div><div>GT</div><div>VEL</div><div></div><div></div>
      </div>
      <div id="stgt-rows-content"></div>
    </div>
    <div style="padding: 12px;">
      <button class="mode-btn" style="border-color:#00d4ff; color:#00d4ff;" onclick="openEdit('new')">+ ADD NOTE</button>
    </div>
  </div>

  <!-- Editor Modal -->
  <div id="edit-modal" class="modal">
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; gap: 6px; justify-content: space-between; align-items: center;">
        <select id="modal-note" style="background: #0a0a14; border: 1px solid #00d4ff44; color: #00d4ff; padding: 4px; font-size: 12px;"></select>
        <input type="number" id="modal-gt" class="bpm-input">
        <input type="number" id="modal-vel" class="bpm-input">
        <button class="ok-btn" onclick="commitEdit()">OK</button>
        <button style="background:none; border:none; color:#666; font-size:16px;" onclick="closeEdit()">✕</button>
      </div>
      <div>
        <div id="modal-st-label" style="color: #555; font-size: 9px; margin-bottom: 2px;">ST: 16</div>
        <div class="st-box" id="st-options-box"></div>
      </div>
    </div>
  </div>

  <script>
    const NOTES = ["C", "B", "A#", "A", "G#", "G", "F#", "F", "E", "D#", "D", "C#"];
    const OCTAVES = [5, 4, 3];
    const ALL_NOTES = OCTAVES.flatMap(oct => NOTES.map(n => `${n}${oct}`));
    const BLACK_NOTES = ["C#", "D#", "F#", "G#", "A#"];
    const ST_OPTIONS = [1,2,3,4,6,8,12,16,24,32,48,96];
    const ST_LABELS = { 1:"64分", 2:"32分", 3:"付点32", 4:"16分", 6:"付点16", 8:"8分", 12:"付点8", 16:"4分", 24:"付点4", 32:"2分", 48:"全音符", 96:"全×2" };

    let gridData = Object.fromEntries(ALL_NOTES.map(n => [n, Array(16).fill(false)]));
    let stgtData = [];
    let currentEditIdx = null;
    let currentForm = { note: "C4", st: 16, gt: 12, vel: 100 };

    let audioCtx = null;
    let isPlaying = false;
    let currentStep = 0;
    let timerId = null;

    function switchMode(mode) {
      document.getElementById('btn-roll').classList.toggle('active', mode === 'roll');
      document.getElementById('btn-stgt').classList.toggle('active', mode === 'stgt');
      document.getElementById('view-roll').style.display = mode === 'roll' ? 'block' : 'none';
      document.getElementById('view-stgt').style.display = mode === 'stgt' ? 'block' : 'none';
      if(mode === 'stgt') renderStgtTable();
    }

    function buildPianoRoll() {
      const header = document.getElementById('step-header-content');
      header.innerHTML = Array(16).fill(0).map((_, i) => `
        <div class="step-num" id="header-step-${i}" style="color: ${i % 4 === 0 ? '#00d4ff' : '#333'}; border-left: ${i % 4 === 0 ? '1px solid #00d4ff22' : '1px solid #1a1a2e'}">${i + 1}</div>
      `).join('');

      const grid = document.getElementById('grid-content');
      grid.innerHTML = ALL_NOTES.map(note => {
        const isBlack = BLACK_NOTES.includes(note.replace(/\d/, ""));
        const isC = note.startsWith("C") && !note.includes("#");
        return `
          <div class="grid-row" style="border-bottom: ${isC ? '1px solid #00d4ff22' : '1px solid #111'}; background: ${isBlack ? '#0d0d18' : '#0a0a14'};">
            <div class="note-label" style="color: ${isBlack ? '#ff6b35' : (isC ? '#00d4ff' : '#555')}; font-weight: ${isC ? 'bold' : 'normal'};">${note}</div>
            ${Array(16).fill(0).map((_, step) => {
              const isActive = gridData[note] && gridData[note][step];
              let bg = step % 4 === 0 ? '#0d1220' : 'transparent';
              let shadow = 'none';
              if (isActive) {
                bg = isBlack ? '#ff6b35' : '#00d4ff';
                shadow = `0 0 8px ${isBlack ? '#ff6b3588' : '#00d4ff88'}`;
              }
              return `
                <div class="cell" id="cell-${note}-${step}" onclick="toggleCell('${note}', ${step})" style="background: ${bg}; box-shadow: ${shadow}; border-left: ${step % 4 === 0 ? '1px solid #00d4ff11' : '1px solid #111'};"></div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function toggleCell(note, step) {
      gridData[note][step] = !gridData[note][step];
      const cell = document.getElementById(`cell-${note}-${step}`);
      const isBlack = BLACK_NOTES.includes(note.replace(/\d/, ""));
      if (gridData[note][step]) {
        cell.style.background = isBlack ? '#ff6b35' : '#00d4ff';
        cell.style.boxShadow = `0 0 8px ${isBlack ? '#ff6b3588' : '#00d4ff88'}`;
      } else {
        cell.style.background = step % 4 === 0 ? '#0d1220' : 'transparent';
        cell.style.boxShadow = 'none';
      }
    }

    function saveToFile() {
      const bpm = Number(document.getElementById('bpm-val').value) || 120;
      const songData = { version: "v0.50", bpm: bpm, gridData: gridData, stgtData: stgtData };
      const blob = new Blob([JSON.stringify(songData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `decopo_song_${Date.now()}.json`; a.click();
      URL.revokeObjectURL(url);
    }

    function triggerLoad() { document.getElementById('file-loader').click(); }

    function loadFile(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const songData = JSON.parse(e.target.result);
          if (songData.bpm) { document.getElementById('bpm-val').value = songData.bpm; updateBpm(); }
          if (songData.gridData) gridData = songData.gridData;
          if (songData.stgtData) stgtData = songData.stgtData;
          buildPianoRoll(); renderStgtTable();
          alert("楽曲データを完全に復元いたしやした！");
        } catch (err) { alert("解析に失敗いたしやした。"); }
      };
      reader.readAsText(file); event.target.value = '';
    }

    function noteToMidi(note) {
      const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const match = note.match(/^([A-G]#?)(\d)$/);
      if (!match) return 60;
      return 12 * (parseInt(match[2], 10) + 1) + scale.indexOf(match[1]);
    }

    // ★可変長バイト（VLQ）変換関数（MIDIデルタタイム用）
    function toVLQ(num) {
      let buffer = []; let n = num;
      buffer.push(n & 0x7F); n >>>= 7;
      while (n > 0) { buffer.push((n & 0x7F) | 0x80); n >>>= 7; }
      return buffer.reverse();
    }

    // ★【新設】純粋なブラウザJSだけでSMF (.mid) バイナリを動的生成する大ハック
    function exportMidiFile() {
      // 1. MIDIヘッダーチャンク (MThd)
      const header = [
        0x4D, 0x54, 0x68, 0x64, // "MThd"
        0x00, 0x00, 0x00, 0x06, // チャンク長 (6バイト)
        0x00, 0x00,             // フォーマット0 (シングルデータ)
        0x00, 0x01,             // トラック数 (1トラック)
        0x00, 0x30              // タイムベース：4分音符=48クロック（レコポ準拠！）
      ];

      // 2. ピアノロールのデータを絶対時間（クロック）のイベントリストに分解
      let midiEvents = [];
      const stepDuration = 12; // 1ステップ（16分音符）＝ 12クロック

      ALL_NOTES.forEach(noteName => {
        const midiNum = noteToMidi(noteName);
        for (let step = 0; step < 16; step++) {
          if (gridData[noteName] && gridData[noteName][step]) {
            const onTime = step * stepDuration;
            const offTime = onTime + 11; // タイトに鳴らすためゲートタイム11に設定
            midiEvents.push({ time: onTime, type: 0x90, note: midiNum, vel: 100 }); // Note On
            midiEvents.push({ time: offTime, type: 0x80, note: midiNum, vel: 0 });   // Note Off
          }
        });
      });

      // クロック順にソート（同時刻ならNote Off(0x80)を先送りにしてバグをヘッジ）
      midiEvents.sort((a, b) => (a.time !== b.time) ? a.time - b.time : a.type - b.type);

      // 3. トラックデータチャンク (MTrk) の構築
      let trackData = [];
      let lastTime = 0;

      // テンポ設定メタイベント (BPMをMIDIに記帳)
      const bpm = Number(document.getElementById('bpm-val').value) || 120;
      const microsecondsPerBeat = Math.round(60000000 / bpm);
      trackData.push(0x00, 0xFF, 0x51, 0x03, 
        (microsecondsPerBeat >> 16) & 0xFF, 
        (microsecondsPerBeat >> 8) & 0xFF, 
        microsecondsPerBeat & 0xFF
      );

      // イベントをデルタタイム（差分時間）に変換しながらバイナリへトス
      midiEvents.forEach(ev => {
        let delta = ev.time - lastTime;
        lastTime = ev.time;
        trackData.push(...toVLQ(delta)); // デルタタイムを可変長で追加
        trackData.push(ev.type, ev.note, ev.vel);
      });

      // トラック終端メタイベント (End of Track)
      trackData.push(0x00, 0xFF, 0x2F, 0x00);

      // トラックヘッダーの結合
      const trkLen = trackData.length;
      const trkHeader = [
        0x4D, 0x54, 0x72, 0x6B, // "MTrk"
        (trkLen >> 24) & 0xFF, (trkLen >> 16) & 0xFF, (trkLen >> 8) & 0xFF, trkLen & 0xFF
      ];

      // 完全なるMIDIストリームの結合
      const midiBlob = new Blob([new Uint8Array([...header, ...trkHeader, ...trackData])], { type: "audio/midi" });
      const url = URL.createObjectURL(midiBlob);
      const a = document.createElement('a');
      a.href = url; a.download = `decopo_track_${Date.now()}.mid`; a.click();
      URL.revokeObjectURL(url);
    }

    function noteToFreq(note) {
      const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
      const match = note.match(/^([A-G]#?)(\d)$/); if (!match) return 0;
      return 440 * Math.pow(2, ((12 * (parseInt(match[2], 10) + 1) + scale.indexOf(match[1])) - 69) / 12);
    }

    function playTone(freq) {
      if (!audioCtx) return; const now = audioCtx.currentTime;
      const oscBase = audioCtx.createOscillator(); const gainBase = audioCtx.createGain(); oscBase.type = 'triangle'; oscBase.frequency.value = freq;
      const oscOvertone = audioCtx.createOscillator(); const gainOvertone = audioCtx.createGain(); oscOvertone.type = 'sine'; oscOvertone.frequency.value = freq * 2;
      const oscAttack = audioCtx.createOscillator(); const gainAttack = audioCtx.createGain(); oscAttack.type = 'sine'; oscAttack.frequency.value = freq * 3.5;
      gainBase.gain.setValueAtTime(0.25, now); gainBase.gain.linearRampToValueAtTime(0.0, now + 0.45);
      gainOvertone.gain.setValueAtTime(0.1, now); gainOvertone.gain.linearRampToValueAtTime(0.0, now + 0.25);
      gainAttack.gain.setValueAtTime(0.12, now); gainAttack.gain.linearRampToValueAtTime(0.0, now + 0.04);
      oscBase.connect(gainBase); gainBase.connect(audioCtx.destination); oscOvertone.connect(gainOvertone); gainOvertone.connect(audioCtx.destination); oscAttack.connect(gainAttack); gainAttack.connect(audioCtx.destination);
      oscBase.start(now); oscBase.stop(now + 0.5); oscOvertone.start(now); oscOvertone.stop(now + 0.3); oscAttack.start(now); oscAttack.stop(now + 0.05);
    }

    function togglePlay() {
      if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      if (audioCtx.state === 'suspended') { audioCtx.resume(); }
      const btn = document.getElementById('btn-play');
      if (isPlaying) { isPlaying = false; btn.innerText = "▶ PLAY"; btn.classList.remove('playing'); clearInterval(timerId); clearHighlight(); } 
      else { isPlaying = true; btn.innerText = "■ STOP"; btn.classList.add('playing'); currentStep = 0; runSequencer(); }
    }

    function updateBpm() { if (isPlaying) { clearInterval(timerId); runSequencer(); } }
    function runSequencer() {
      const bpm = Number(document.getElementById('bpm-val').value) || 120; const interval = (60 / bpm / 4) * 1000;
      const stepExecution = () => {
        clearHighlight();
        const headerCell = document.getElementById(`header-step-${currentStep}`); if (headerCell) headerCell.classList.add('active-step');
        ALL_NOTES.forEach(note => {
          const cell = document.getElementById(`cell-${note}-${currentStep}`); if (cell) cell.classList.add('active-column');
          if (gridData[note] && gridData[note][currentStep]) { playTone(noteToFreq(note)); }
        });
        currentStep = (currentStep + 1) % 16;
      };
      stepExecution(); timerId = setInterval(stepExecution, interval);
    }

    function clearHighlight() {
      for (let i = 0; i < 16; i++) { const hc = document.getElementById(`header-step-${i}`); if (hc) hc.classList.remove('active-step'); }
      ALL_NOTES.forEach(note => { for (let i = 0; i < 16; i++) { const cell = document.getElementById(`cell-${note}-${i}`); if (cell) cell.classList.remove('active-column'); } });
    }

    function renderStgtTable() {
      const container = document.getElementById('stgt-rows-content');
      container.innerHTML = stgtData.map((row, i) => `
        <div class="stgt-row" onclick="openEdit(${i})" style="background: ${currentEditIdx === i ? '#0d1a2e' : 'transparent'};">
          <div style="color: #333; font-size: 9px;">${i + 1}</div>
          <div style="color: ${BLACK_NOTES.includes(row.note.replace(/\d/,"")) ? '#ff6b35' : '#00d4ff'}; font-size: 12px; font-weight: bold;">${row.note}</div>
          <div style="color: #e0e0e0; font-size: 11px;">${row.st}${ST_LABELS[row.st] ? `(${ST_LABELS[row.st]})` : ''}</div>
          <div style="color: #aaa; font-size: 11px;">${row.gt}</div>
          <div style="color: #aaa; font-size: 11px;">${row.vel}</div>
          <div onclick="event.stopPropagation(); insertAfter(${i});" style="color: #00d4ff66; font-size: 16px; text-align: center;">+</div>
          <div onclick="event.stopPropagation(); deleteRow(${i});" style="color: #ff335566; font-size: 12px; text-align: center;">✕</div>
        </div>
      `).join('');
    }
    function buildModalSelect() { document.getElementById('modal-note').innerHTML = ALL_NOTES.map(n => `<option value="${n}">${n}</option>`).join(''); }
    function buildModalStOptions() { document.getElementById('st-options-box').innerHTML = ST_OPTIONS.map(v => `<button id="st-opt-${v}" class="st-btn" onclick="setFormSt(${v})">${v}</button>`).join(''); }
    function setFormSt(v) { currentForm.st = v; if (currentForm.gt > v) currentForm.gt = v; document.getElementById('modal-gt').value = currentForm.gt; updateModalUi(); }
    function updateModalUi() { document.getElementById('modal-st-label').innerText = `ST: ${currentForm.st} ${ST_LABELS[currentForm.st] ? `(${ST_LABELS[currentForm.st]})` : ''}`; ST_OPTIONS.forEach(v => { document.getElementById(`st-opt-${v}`).classList.toggle('active', currentForm.st === v); }); }
    function openEdit(idx) { currentEditIdx = idx; if (idx === 'new') { currentForm = { note: "C4", st: 16, gt: 12, vel: 100 }; } else { currentForm = { ...stgtData[idx] }; } document.getElementById('modal-note').value = currentForm.note; document.getElementById('modal-gt').value = currentForm.gt; document.getElementById('modal-vel').value = currentForm.vel; updateModalUi(); document.getElementById('edit-modal').style.display = 'block'; if(idx !== 'new') renderStgtTable(); }
    function commitEdit() { currentForm.note = document.getElementById('modal-note').value; currentForm.gt = Number(document.getElementById('modal-gt').value); currentForm.vel = Number(document.getElementById('modal-vel').value); if (currentEditIdx === 'new') { stgtData.push({ ...currentForm }); } else { stgtData[currentEditIdx] = { ...currentForm }; } closeEdit(); }
    function deleteRow(idx) { stgtData.splice(idx, 1); renderStgtTable(); }
    function insertAfter(idx) { stgtData.splice(idx + 1, 0, { note: "C4", st: 16, gt: 12, vel: 100 }); openEdit(idx + 1); }

    buildPianoRoll(); buildModalSelect(); buildModalStOptions();
  </script>
</body>
</html>
